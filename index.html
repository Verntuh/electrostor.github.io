<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2333 0%, #2c2f33 100%);
            color: #e0e0e0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: rgba(40, 44, 52, 0.85);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(43, 112, 185, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b70b9, #1a4573);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(43, 112, 185, 0.5);
            overflow: hidden;
        }

        .logo img {
            width: 110px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #2b70b9;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-blue {
            background: linear-gradient(90deg, #2b70b9, #3682d4);
            color: white;
            box-shadow: 0 8px 20px rgba(43, 112, 185, 0.4);
        }

        .btn-blue:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(43, 112, 185, 0.5);
            background: linear-gradient(90deg, #3682d4, #2b70b9);
        }

        .btn-orange {
            background: linear-gradient(90deg, #f38a2e, #ff9d47);
            color: white;
            box-shadow: 0 8px 20px rgba(243, 138, 46, 0.4);
        }

        .btn-orange:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(243, 138, 46, 0.5);
            background: linear-gradient(90deg, #ff9d47, #f38a2e);
        }

        .icon {
            margin-right: 10px;
            font-size: 1.3rem;
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #888;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.85rem;
            }
            .logo {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <div class="logo">
            <img src="logo.png" alt="Amazon Logo">
        </div>

        <h1>Electro Store</h1>
        <p class="subtitle">Електроніка з Amazon</p>

        <a href="https://t.me/electrostoramazon" class="btn btn-blue" target="_blank">
            <span class="icon">📢</span> НАШ ТЕЛЕГРАМ КАНАЛ
        </a>
        
        <a href="https://t.me/+380756966973" class="btn btn-blue" target="_blank">
            <span class="icon">💬</span> НАПИСАТИ В TELEGRAM
        </a>
        
        <a href="viber://chat?number=380756966973" class="btn btn-blue" target="_blank">
            <span class="icon">📱</span> НАПИСАТИ В VIBER
        </a>
        
        <a href="tel:+380756966973" class="btn btn-orange">
            <span class="icon">📞</span> ПОДЗВОНИТИ ЗАРАЗ
        </a>

        <footer>
            Швидка доставка • Оригінальна електроніка • Гарантія
        </footer>
    </div>
</body>
</html>
