<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2333 0%, #2c2f33 100%);
            color: #e0e0e0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: rgba(40, 44, 52, 0.92);
            border-radius: 28px;
            padding: 45px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(43, 112, 185, 0.35);
            backdrop-filter: blur(12px);
        }

        .logo-container {
            width: 210px;
            height: 210px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2b70b9, #1a4573);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 15px 40px rgba(43, 112, 185, 0.7),
                inset 0 0 30px rgba(255,255,255,0.1);
            overflow: hidden;
            padding: 12px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;           /* Заполняет весь круг */
            border-radius: 50%;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
        }

        h1 {
            font-size: 2.35rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
        }

        .subtitle {
            color: #2b70b9;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 17px 20px;
            margin: 13px 0;
            border-radius: 16px;
            font-size: 1.08rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.35s ease;
        }

        .btn-blue {
            background: linear-gradient(90deg, #2b70b9, #3682d4);
            color: white;
            box-shadow: 0 8px 22px rgba(43, 112, 185, 0.45);
        }

        .btn-blue:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(43, 112, 185, 0.55);
        }

        .btn-orange {
            background: linear-gradient(90deg, #f38a2e, #ff9d47);
            color: white;
            box-shadow: 0 8px 22px rgba(243, 138, 46, 0.45);
        }

        .btn-orange:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(243, 138, 46, 0.55);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.35rem;
        }

        footer {
            margin-top: 45px;
            font-size: 0.88rem;
            color: #aaaaaa;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .container {
                padding: 38px 25px;
            }
            .logo-container {
                width: 180px;
                height: 180px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Твоё лого на весь круг -->
        <div class="logo-container">
            <img src="logo.jpg" alt="Electro Store Logo">
        </div>

        <h1>Electro Store</h1>
        <p class="subtitle">Палети Amazon</p>

        <a href="https://t.me/electrostoramazon" class="btn btn-blue" target="_blank">
            <span class="icon">📢</span> НАШ ТЕЛЕГРАМ КАНАЛ
        </a>
        
        <a href="https://t.me/+380756966973" class="btn btn-blue" target="_blank">
            <span class="icon">💬</span> НАПИСАТИ В TELEGRAM
        </a>
        
        <a href="https://viber.click/380756966973" class="btn btn-blue" target="_blank">
            <span class="icon">📱</span> НАПИСАТИ В VIBER
        </a>
        
        <a href="tel:+380756966973" class="btn btn-orange">
            <span class="icon">📞</span> ПОДЗВОНИТИ ЗАРАЗ
        </a>

        <footer>
            Швидка доставка • Низькі ціни
        </footer>
    </div>
</body>
</html>
